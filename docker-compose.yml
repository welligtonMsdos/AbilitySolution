services:
  mongodb:
    image: mongo:latest
    container_name: mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  ability-api:
    build:
      context: . 
      dockerfile: Ability.Api/Dockerfile
    container_name: ability_api
    ports:
      - "5015:8080"
    environment:      
      - ConnectionStrings__Mongo=${MONGO_CONNECTION}
      - DatabaseName=${MONGO_DB_NAME}
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - mongodb

  ability-worker:
    build:
      context: . 
      dockerfile: Ability.Worker/Dockerfile
    container_name: ability_worker
    shm_size: "1gb"
    dns:
    - 8.8.8.8
    - 1.1.1.1
    environment:
      - ConnectionStrings__Mongo=${MONGO_CONNECTION}
      - DatabaseName=${MONGO_DB_NAME}
    depends_on:
      - mongodb

volumes:
  mongo_data: